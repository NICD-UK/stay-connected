<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank you for taking part — NICD</title>
  <meta name="description" content="The training environment is now closed. Visit NICD or get in touch with the team.">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #1a1f2b;
      background: #ffffff;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .content {
      max-width: 34rem;
    }

    h1 {
      margin: 0 0 1.25rem;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
      font-weight: 650;
    }

    p {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      line-height: 1.6;
      color: #5a6473;
    }

    a {
      color: #1a1f2b;
      font-weight: 600;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    a:focus-visible {
      outline: 3px solid #ffbf47;
      outline-offset: 3px;
    }

    footer {
      padding: 1.5rem;
      font-size: 0.875rem;
      color: #7a8391;
      text-align: center;
    }
  </style>
</head>

<body>
  <main>
    <div class="content">
      <h1>Thank you for taking part</h1>

      <p>This training environment is now closed.</p>

      <p>
        If you need anything else, please visit
        <a href="https://www.nicd.org.uk/">NICD</a>
        or get in touch with the team.
      </p>
    </div>
  </main>

  <footer>National Innovation Centre for Data</footer>
</body>
</html>
